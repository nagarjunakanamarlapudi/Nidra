name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Type check (mypy)
        run: uv run mypy src

  backend-tests:
    name: backend-tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pragya
          POSTGRES_PASSWORD: pragya
          POSTGRES_DB: pragya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pragya -d pragya_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://pragya:pragya@localhost:5432/pragya_test
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Tests (pytest)
        run: uv run pytest -q

  frontend:
    name: frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build

  security:
    name: security (gitleaks · pip-audit · npm-audit · bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── Secret scanning (blocking) ─────────────────────────────────
      # Run the gitleaks binary directly — gitleaks-action@v2 targets the
      # deprecated Node 20 and crashes on GitHub's Node 24 runner.
      - name: Gitleaks secret scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(curl -sSfL -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -o 'https://[^"]*linux_x64\.tar\.gz' | head -1)
          curl -sSfL "$URL" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --config .gitleaks.toml --redact --no-banner --exit-code 1

      # ── Python dependency audit ────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: pip-audit (backend)
        run: |
          cd backend
          uv sync --frozen
          uvx pip-audit --requirement <(uv export --no-hashes 2>/dev/null) || true

      # ── SAST (defense-in-depth alongside ruff S) ──────────────────
      - name: Bandit SAST (backend/src)
        run: |
          pip install bandit
          bandit -r backend/src -ll

      # ── Frontend dependency audit ──────────────────────────────────
      - name: npm audit (frontend)
        run: |
          cd frontend
          npm audit --audit-level=high || true

  docs:
    name: docs (mermaid)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Validate Mermaid diagrams
        run: cd tools/mermaid-check && npm install --no-audit --no-fund && node check.mjs ../../docs
