version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]

  # ── Python (pip / uv) ───────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    # Major package bumps are deliberate upgrades, not auto-PRs.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Frontend (npm) ──────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    # Major framework/tooling bumps (TS, ESLint, @types/node) are deliberate.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Docker (runtime base images — keep stable; patch-only auto-PRs) ──
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "docker"
    directory: "/infra/cron"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "*"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
