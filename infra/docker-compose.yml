name: pragya

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pragya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pragya}
      POSTGRES_DB: ${POSTGRES_DB:-pragya}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pragya} -d ${POSTGRES_DB:-pragya}"]
      interval: 3s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Always point at the db service, regardless of .env (which may target localhost).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pragya}:${POSTGRES_PASSWORD:-pragya}@db:5432/${POSTGRES_DB:-pragya}
      # Subscription auth for the claude-code engine (from `claude setup-token`).
      # Must be set for AGENT_ENGINE=claude-code; leave ANTHROPIC_API_KEY unset so it wins.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Keep Claude Code's sessions/transcripts in their own dir under the writable HOME.
      CLAUDE_CONFIG_DIR: /home/pragya/.pragya-assistant
      # Run the container in the digest timezone so the engine's own clock (used in
      # the digest greeting) matches the date we compute.
      TZ: ${DIGEST_TIMEZONE:-UTC}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 5s
      timeout: 3s
      retries: 30

  # NOTE: the Telegram long-polling worker is no longer a separate service. It now
  # runs in-process inside the backend, managed by the connectors platform (enable
  # the Telegram connector in the UI). This gives it the live agent + all connector
  # tools. The webhook route remains an alternative ingress.

  cron:
    build:
      context: ./cron
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      API_BASE: "http://backend:8000"
      TZ: "${DIGEST_TIMEZONE:-UTC}"
      DIGEST_HOUR: "${DIGEST_HOUR:-8}"
      DIGEST_MINUTE: "${DIGEST_MINUTE:-0}"
      DREAM_HOUR: "${DREAM_HOUR:-0}"
      DREAM_MINUTE: "${DREAM_MINUTE:-0}"
      FINANCE_SYNC_HOUR: "${FINANCE_SYNC_HOUR:-6}"
      FINANCE_SYNC_MINUTE: "${FINANCE_SYNC_MINUTE:-30}"
      FINANCE_WEEKLY_ENABLED: "${FINANCE_WEEKLY_ENABLED:-true}"
      FINANCE_WEEKLY_DAY: "${FINANCE_WEEKLY_DAY:-mon}"
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Baked into the bundle; the browser reaches the API at this host URL.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
