# TLS ingress. Applied AFTER ingress-nginx is installed and its DO load balancer
# has an external IP — substitute that IP into __HOST__ (e.g. api.143-198-1-2.sslip.io)
# so cert-manager can solve the HTTP-01 challenge. The long proxy timeouts matter:
# claude-code agent calls (chat, dream) can run for minutes.
#
#   export LB_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
#   export HOST="api.${LB_IP//./-}.sslip.io"
#   sed "s/__HOST__/${HOST}/g" infra/k8s/ingress.yaml | kubectl apply -f -
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: kpraveen420@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: nidra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "__HOST__"
      secretName: backend-tls
  rules:
    - host: "__HOST__"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
