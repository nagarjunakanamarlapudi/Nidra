# The scheduled work, translated from infra/cron/entrypoint.sh into native
# CronJobs. Each is a tiny authenticated curl to the in-cluster API. Schedules +
# timezone mirror your .env (digest 21:00, dream 00:00, finance 06:30, opinions
# hourly at :07, weekly digest Mon 21:00), America/Los_Angeles. `-m 280` caps each
# call; concurrencyPolicy Forbid prevents overlap with a still-running job.
# NOTE: args use folded (>-) block scalars — an unquoted "Authorization: Bearer"
# would otherwise be parsed as a YAML map.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-digest
spec:
  schedule: "0 21 * * *"
  timeZone: America/Los_Angeles
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: curl
              image: curlimages/curl:8.11.1
              envFrom:
                - secretRef:
                    name: pragya-env
              command: ["sh", "-c"]
              args:
                - >-
                  curl -fsS -m 280 -X POST
                  "http://backend.nidra.svc.cluster.local:8000/digests/run"
                  -H "Authorization: Bearer ${API_AUTH_TOKEN}"
---
