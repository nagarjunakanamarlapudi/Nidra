# Every 15 min: resolve open scenario branches against real activity (honest rules)
# and reconcile mis-ranked batches (diagnose + hedged lesson + ΔState refresh).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-scenario-verify
spec:
  schedule: "*/15 * * * *"
  timeZone: America/Los_Angeles
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: curl
              image: curlimages/curl:8.11.1
              envFrom:
                - secretRef:
                    name: pragya-env
              command: ["sh", "-c"]
              args:
                - >-
                  curl -fsS -m 280 -X POST
                  "http://backend.nidra.svc.cluster.local:8000/scenarios/verify"
                  -H "Authorization: Bearer ${API_AUTH_TOKEN}"
---
# Every 3 hours: verify first (fresh track record), then generate a new batch of
# competing next-action predictions.
apiVersion: batch/v1
