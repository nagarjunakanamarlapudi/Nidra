# Nightly: refresh opinions from real signals, then dream on top of them.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-dream
spec:
  schedule: "0 0 * * *"
  timeZone: America/Los_Angeles
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: curl
              image: curlimages/curl:8.11.1
              envFrom:
                - secretRef:
                    name: pragya-env
              command: ["sh", "-c"]
              args:
                - >-
                  curl -fsS -m 280 -X POST
                  "http://backend.nidra.svc.cluster.local:8000/opinions/refresh"
                  -H "Authorization: Bearer ${API_AUTH_TOKEN}" ;
                  curl -fsS -m 280 -X POST
                  "http://backend.nidra.svc.cluster.local:8000/dreams/run"
                  -H "Authorization: Bearer ${API_AUTH_TOKEN}"
